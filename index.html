<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule | Hack Club Curaçao</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <style>
        @font-face { font-family: 'Phantom Sans'; src: url('https://assets.hackclub.com/fonts/Phantom_Sans_0.7/Regular.woff') format('woff'); }
        
        body {
            font-family: 'Phantom Sans', sans-serif;
            margin: 0; padding: 0;
            background: #000080;
            color: white;
            overflow-x: hidden;
        }

        canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
            pointer-events: none;
            opacity: 0.6;
        }

        /* Consistency with Rules Page */
        .glass { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 30px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1.2);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
        }

        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #FDE047;
            box-shadow: 0 0 20px rgba(253, 224, 71, 0.2);
            transform: scale(1.05);
        }

        /* HD Rounded Logo */
        .logo-hd {
            height: 40px; /* Base height */
            width: auto;
            border-radius: 12px; /* Smooth rounding */
            object-fit: contain;
            image-rendering: -webkit-optimize-contrast; /* Keeps SVG crisp */
        }

        @media (min-width: 768px) {
            .logo-hd { height: 48px; }
        }

        .event-card {
            display: grid;
            grid-template-columns: 80px 1fr auto;
            align-items: center;
            gap: 1.5rem;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 640px) {
            .event-card { grid-template-columns: 1fr; text-align: center; justify-items: center; }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000080; }
        ::-webkit-scrollbar-thumb { background: #FDE047; border-radius: 10px; }
    </style>
</head>
<body>

    <canvas id="three-canvas"></canvas>

    <nav class="fixed top-0 w-full p-4 md:p-8 flex justify-between items-center z-50">
        <a href="index.html" class="p-2 rounded-xl bg-transparent transition-transform hover:scale-110">
            <img src="logo.svg" alt="Hack Club Curaçao" class="logo-hd">
        </a>
        
        <div class="flex gap-2 md:gap-4 font-bold uppercase tracking-widest text-[9px] md:text-[10px]">
            <a href="index.html" class="btn-glass px-3 md:px-5 py-2 rounded-full">Home</a>
            <a href="https://join.curahack.club" class="btn-glass px-4 md:px-6 py-2 md:py-2.5 rounded-xl md:rounded-2xl font-black uppercase tracking-tighter text-[9px] md:text-xs shadow-xl">
                Join
            </a>
        </div>
    </nav>

    <main class="pt-32 pb-20 px-4 max-w-4xl mx-auto">
        <div class="glass p-8 md:p-12 mb-10 text-center">
            <h1 class="text-5xl md:text-7xl font-black italic tracking-tighter uppercase leading-none mb-4">
                Club <span class="text-yellow-400">Schedule</span>
            </h1>
            <p class="text-lg opacity-80 font-bold uppercase tracking-widest">
                Explore the timeline of our events.
            </p>
        </div>

        <div id="events-list" class="grid gap-6">
            <div class="text-center opacity-50 py-10 italic">Waking up the database...</div>
        </div>
    </main>

    <script>
        // Use your specific Supabase credentials here
        const SUPABASE_URL = 'https://cjfavgrqfcxlqiodulec.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNqZmF2Z3JxZmN4bHFpb2R1bGVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNzM5NDAsImV4cCI6MjA5MTg0OTk0MH0._V-IlD6GJ2wtq-DyJuj0aKDbCopo-PjOU_fPDk7CKTk';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadSchedule() {
            const { data, error } = await supabaseClient
                .from('events')
                .select('*')
                .order('event_date', { ascending: true });

            const container = document.getElementById('events-list');

            if (error || !data) {
                container.innerHTML = `<p class="text-center text-red-400">Failed to load schedule. Check your Supabase table.</p>`;
                return;
            }

            container.innerHTML = data.map(event => `
                <div class="glass event-card">
                    <div class="flex flex-col items-center border-r border-white/10 pr-6">
                        <span class="text-3xl font-black italic text-yellow-400 leading-none">
                            ${new Date(event.event_date).getDate()}
                        </span>
                        <span class="text-[10px] font-bold uppercase tracking-tighter opacity-60">
                            ${new Date(event.event_date).toLocaleString('default', { month: 'short' })}
                        </span>
                    </div>
                    <div>
                        <h3 class="text-xl font-black uppercase italic mb-1">${event.title}</h3>
                        <p class="text-sm opacity-70 mb-2">${event.description}</p>
                        <div class="flex gap-3">
                            <span class="text-[10px] font-bold bg-white/10 px-2 py-1 rounded">🕒 ${event.time}</span>
                            <span class="text-[10px] font-bold bg-white/10 px-2 py-1 rounded">📍 ${event.location}</span>
                        </div>
                    </div>
                    <div class="text-4xl">
                        ${event.icon_svg}
                    </div>
                </div>
            `).join('');
        }

        // Initialize 3D Background from Rules page
        let scene, camera, renderer, knot;
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            const geometry = new THREE.TorusKnotGeometry(10, 3, 100, 16);
            knot = new THREE.Mesh(geometry, new THREE.MeshNormalMaterial({ wireframe: true }));
            scene.add(knot);
            camera.position.z = 40;
            function animate() {
                requestAnimationFrame(animate);
                knot.rotation.x += 0.002; knot.rotation.y += 0.003;
                renderer.render(scene, camera);
            }
            animate();
        }

        window.onload = () => {
            init3D();
            loadSchedule();
        };

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
